{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<h2>Welcome back!</h2>

<form method="post">
  {% csrf_token %}
  {{form.as_p}}
  <button type="submit">Log In</button>
</form>

<div class="link">
  <a href="{% url 'forgot_password' %}">Forgot Password?</a>
  <p>Don't have an account? <a href="{% url 'register' %}">Sign Up</a></p>
    
</div>

{% endblock %}
